name: CD Backend

# Flux de déploiement à 3 branches :
#   dev     → développement local uniquement, pas de déploiement auto
#   staging → Railway staging (GitHub Environment "staging")
#   main    → Railway production (GitHub Environment "production")
#
# Les variables RAILWAY_TOKEN et RAILWAY_SERVICE_NAME sont définies
# par environnement dans GitHub → Settings → Environments.
on:
  push:
    branches: [main, staging]
    paths:
      - "apps/backend/**"
      - "package*.json"
      - ".nvmrc"

# Pas d'annulation en cours — un déploiement ne doit pas être interrompu
concurrency:
  group: cd-backend-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy to Railway (${{ github.ref_name }})
    runs-on: ubuntu-latest

    # Sélection automatique de l'environnement GitHub selon la branche.
    # Chaque environnement a ses propres RAILWAY_TOKEN et RAILWAY_SERVICE_NAME.
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Épingler la version pour la sécurité supply-chain.
      # Vérifier la dernière version stable : https://github.com/railwayapp/cli/releases
      - name: Install Railway CLI
        run: npm install -g @railway/cli@3.15.0

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ vars.RAILWAY_SERVICE_NAME }}" \
            --detach

      - name: Summary
        run: |
          BRANCH="${{ github.ref_name }}"
          ENV="${{ github.ref_name == 'main' && 'production' || 'staging' }}"
          echo "✓ Déploiement Railway déclenché : branche=${BRANCH} → environnement=${ENV}"
          echo "  Service : ${{ vars.RAILWAY_SERVICE_NAME }}"
          echo "  Suivre l'avancement dans le dashboard Railway."
