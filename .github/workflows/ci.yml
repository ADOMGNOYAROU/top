name: CI

on:
  pull_request:
    branches: [main, staging, dev]

# Un seul run par PR — annule les runs précédents si un nouveau push arrive
concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── Backend ────────────────────────────────────────────────────
  backend-ci:
    name: Backend — lint / typecheck / test / build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      # apps/backend est autonome (son propre package-lock.json) depuis que
      # le package.json racine a été repris par le frontend (restructuration
      # Vercel, plus de champ "workspaces" — voir
      # apps/backend/contexte/progress-tracker.md).
      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/backend
        run: npm run prisma:generate

      - name: Lint
        working-directory: apps/backend
        run: npm run lint

      - name: Type check
        working-directory: apps/backend
        run: npm run typecheck

      - name: Unit tests
        working-directory: apps/backend
        run: npm run test

      - name: Build
        working-directory: apps/backend
        run: npm run build

  # ── Frontend ───────────────────────────────────────────────────
  frontend-ci:
    name: Frontend — lint / typecheck / build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --workspace=apps/frontend

      - name: Lint
        run: npm run lint --workspace=apps/frontend

      - name: Type check
        run: npm run typecheck --workspace=apps/frontend

      - name: Build production
        run: npm run build:frontend
        env:
          # Variables injectées au build CI pour éviter les erreurs de déclaration NG_APP_*
          NG_APP_API_URL: https://placeholder.up.railway.app/api
          NG_APP_SENTRY_DSN: ""
          NG_APP_VAPID_PUBLIC_KEY: ""
